problem: "wave_2d"
network:
  input_dim: 3  # x, y, t
  hidden_layers: [64, 64, 64, 64]
  output_dim: 1
  activation: "tanh"
  use_batch_norm: false
training:
  epochs: 8000
  learning_rate: 0.001
  lr_scheduler: "cosine"
  batch_size: 2048
  weight_decay: 0.0
  verbose_interval: 500
physics:
  c: 1.0  # Wave speed
visualization:
  time_slices: [0.0, 0.3, 0.6, 1.0]
