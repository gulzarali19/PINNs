problem: "burgers_1d"
network:
  input_dim: 2
  hidden_layers: [128, 128, 128, 128, 128]
  output_dim: 1
  activation: "tanh"
  use_batch_norm: false
training:
  epochs: 50000
  learning_rate: 0.001
  lr_scheduler: "exponential"
  batch_size: 1024
  weight_decay: 0.0
  verbose_interval: 1000
physics:
  nu: 0.003183  # 0.01/pi (viscosity coefficient)
