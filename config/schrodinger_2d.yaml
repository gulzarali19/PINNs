problem: "schrodinger_2d"
network:
  input_dim: 3  # x, y, t
  hidden_layers: [128, 128, 128]
  output_dim: 2  # Real and imaginary parts
  activation: "tanh"
  use_batch_norm: false
training:
  epochs: 10000
  learning_rate: 0.001
  lr_scheduler: "cosine"
  batch_size: 2048
  weight_decay: 1e-4
  verbose_interval: 500
physics:
  potential: "harmonic"
