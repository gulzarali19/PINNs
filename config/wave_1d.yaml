problem: "wave_1d"
network:
  input_dim: 2
  hidden_layers: [64, 64, 64, 64, 64]
  output_dim: 1
  activation: "tanh"
  use_batch_norm: false
training:
  epochs: 10000
  learning_rate: 0.001
  lr_scheduler: "exponential"
  batch_size: 1024
  weight_decay: 0.0
  verbose_interval: 500
physics:
  c: 1.0  # Wave speed
visualization:
  time_slices: [0.0, 0.25, 0.5, 0.75, 1.0]
