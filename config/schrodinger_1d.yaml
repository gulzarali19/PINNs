problem: "schrodinger_1d"
network:
  input_dim: 2
  hidden_layers: [128, 128, 128, 128]
  output_dim: 2  # Real and imaginary parts
  activation: "tanh"
  use_batch_norm: false
training:
  epochs: 12000
  learning_rate: 0.001
  lr_scheduler: "exponential"
  batch_size: 1024
  weight_decay: 1e-4
  verbose_interval: 500
physics:
  potential: "harmonic"  # Can be: harmonic, square_well, coulomb
